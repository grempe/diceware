# https://taskfile.dev

version: "3"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list-all

  install:
    desc: Install npm dependencies
    cmds:
      - npm install
    sources:
      - package.json
    generates:
      - node_modules/.package-lock.json

  serve:
    desc: Start local dev server on http://localhost:8080
    aliases: [server, dev]
    cmds:
      - caddy run

  lint:
    desc: Check linting and formatting
    deps: [install]
    cmds:
      - npx biome check .

  lint-fix:
    desc: Auto-fix lint and format issues
    deps: [install]
    cmds:
      - npx biome check --write .

  format:
    desc: Format all files
    deps: [install]
    cmds:
      - npx biome format --write .

  verify:
    desc: Run all verification tiers, update list metadata and reports
    cmds:
      - deno run --allow-read --allow-write --allow-env tools/verify-lists.ts --write {{.CLI_ARGS}}

  verify-check:
    desc: Quick read-only verification (tiers 1+2, no writes)
    cmds:
      - deno run --allow-read --allow-env tools/verify-lists.ts {{.CLI_ARGS}}

  precommit:
    desc: Run all precommit checks (format + lint + full verification)
    deps: [install]
    cmds:
      - task: format
      - task: lint
      - task: verify
